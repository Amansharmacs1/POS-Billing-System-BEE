<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Billing System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://logopond.com/logos/066abbc22b4f3fb9c0816fc16fb8965d.png">



</head>

<body>
    <h1 id="mainheading">Retail Billing System </h1>
    <div class="container">
        <div class="card">
            <h2>Add to Cart</h2>
            <div class="product-group">
                <div>
                    <label for="product-filter">Product Desc</label>
                    <input type="text" id="product-filter" name="product-filter" placeholder="Enter Product id..."
                        required>
                </div>
                <div>
                    <label for="product-price">Product Price</label>
                    <input type="number" id="product-price" name="product-price" placeholder="Enter Product Price...">
                </div>
                <div>
                    <label for="product-qty">Product Quantity</label>
                    <input type="number" id="product-qty" name="product-qty" placeholder="Enter Product Quantity...">
                </div>

                <div>
                    <button type="submit" id="addtocart">Add to Cart</button>
                </div>
            </div>
            <br>

            <h2>Cart Items </h2>
            <div id="cart-items">
                <table>
                    <thead>
                        <tr>
                            <th>Product Desc</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>

                        </tr>
                    </thead>
                    <tbody id="cart-items-body">

                    </tbody>
                </table>
            </div>

            <div class="bill-card">
                <h2>Bill Summary</h2>

                <div class="billsummary">
                    <div class="total-items">
                        Total Items: <span id="totalitems">0</span>
                    </div>

                    <div class="sub-total">
                        Sub Total: <span id="subtotal">0.00</span>
                    </div>

                    <div class="GST">
                        GST: <span id="totalGST">0.00</span>
                    </div>

                    <div class="grand-total">
                        Grand Total: <span id="grandtotal">0.00</span>
                    </div>
                </div>
            </div>
           <button id="finalbill">Generate Invoice</button>
           <div class="invoice" id="invoice" style="display: none;">
    <h2>Invoice</h2>

    <p><strong>Invoice No:</strong> <span id="invoice-number"></span></p>
    <p><strong>Date:</strong> <span id="invoice-date"></span></p>
    <p><strong>Time:</strong> <span id="invoice-time"></span></p>

    <table id="invoice-table">
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="invoice-items"></tbody>
    </table>

    <p><strong>Subtotal:</strong> ₹<span id="invoice-subtotal"></span></p>
    <p><strong>GST:</strong> ₹<span id="invoice-gst"></span></p>
    <p><strong>Grand Total:</strong> ₹<span id="invoice-grandtotal"></span></p>
</div>
        </div>
    </div>




    <script src="script.js"> </script>
</body>

</html>
