<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Billing System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://logopond.com/logos/066abbc22b4f3fb9c0816fc16fb8965d.png">

    

</head>

<body>
    <h1 id="mainheading">Retail Billing System </h1>
    <div class="container">
        <div class="card">
            <h2>Add to Cart</h2>
            <div class="product-group">
                <div>
                    <label for="product-filter">Product Desc</label>
                    <input type="text" id="product-filter" name="product-filter" placeholder="Enter Product id..."
                        required>
                </div>
                <div>
                    <label for="product-price">Product Price</label>
                    <input type="number" id="product-price" name="product-price" placeholder="Enter Product Price...">
                </div>
                <div>
                    <label for="product-qty">Product Quantity</label>
                    <input type="number" id="product-qty" name="product-qty" placeholder="Enter Product Quantity...">
                </div>

                <div>
                    <button type="submit" id="addtocart">Add to Cart</button>
                </div>
            </div>
            <br>

            <h2>Cart Items </h2>
            <div id="cart-items">
                <table>
                    <thead>
                        <tr>
                            <th>Product Desc</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                            
                        </tr>
                    </thead>
                    <tbody id="cart-items-body">

                    </tbody>
                </table>
            </div>

        </div>
    </div>


    <h2 id="finalbill">Final Bill: $0</h2>

    <script src="script.js"> </script>
</body>

</html>
